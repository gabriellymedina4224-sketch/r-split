<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Rsplit</title>

  <!-- Fonte bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;

      /* Fundo degradê */
      background: linear-gradient(135deg, #eeeef0, #2a5298, #6dd5fa);
      
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      text-align: center;
    }

    .logo {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
    }

    button {
      padding: 25px;
      font-size: 16px;
      border: none;
      border-radius: 15px;

      background: rgba(255, 255, 255, 0.15);
      color: white;

      backdrop-filter: blur(10px);
      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.25);
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="logo">❄ Rsplit</div>
    <div class="sub">Sistema de gestão técnica</div>

    <div class="menu">
      <button onclick="ir('pagina1.html')">Orçamento</button>
      <button onclick="ir('pagina2.html')">Ficha Técnica</button>
      <button onclick="ir('pagina3.html')">Recibo</button>
      <button onclick="ir('pagina4.html')">Laudo</button>
      <button onclick="ir('pagina5.html')">Certificado</button>
      <button onclick="ir('pagina6.html')">Clientes</button>
    </div>
  </div>

  <script>
    function ir(pagina) {
      window.location.href = pagina;
    }
  </script>

</body>
</html>
