<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Orçamento - Rsplit</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, rgb(185, 202, 233), #2a5298, #6dd5fa);
  color: white;
  padding: 30px;
}

h1 {
  text-align: center;
}

.subtitle {
  text-align: center;
  opacity: 0.8;
  margin-bottom: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  margin-bottom: 20px;
}

.card h3 {
  margin-top: 0;
}

input, textarea {
  width: 97%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

textarea {
  resize: none;
}

.linha {
  display: flex;
  gap: 10px;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ffffff30;
  backdrop-filter: blur(5px);
  color: white;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <h1>❄ Rsplit</h1>
  <p class="subtitle">Orçamento Técnico</p>

  <div class="card">
    <h3>Cliente</h3>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="text" id="documento" placeholder="CPF ou CNPJ">
    <input type="text" id="telefone" placeholder="Telefone">
  </div>

  <div class="card">
    <h3>Endereço</h3>
    <input type="text" id="cep" placeholder="CEP">
    <input type="text" id="rua" placeholder="Rua">

    <div class="linha">
      <input type="text" id="cidade" placeholder="Cidade">
      <input type="text" id="estado" placeholder="UF">
    </div>

    <input type="text" id="numero" placeholder="Número">
  </div>

  <div class="card">
    <h3>Observação</h3>
    <textarea id="obs" placeholder="Detalhes adicionais"></textarea>
  </div>

  <button onclick="gerarPDF()">Gerar PDF</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// ===== FORMATA CPF/CNPJ =====
const inputDoc = document.getElementById('documento');

inputDoc.addEventListener('input', () => {
  let valor = inputDoc.value.replace(/\D/g, '');

  if (valor.length <= 11) {
    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  } else {
    valor = valor.replace(/^(\d{2})(\d)/, '$1.$2');
    valor = valor.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
    valor = valor.replace(/\.(\d{3})(\d)/, '.$1/$2');
    valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
  }

  inputDoc.value = valor;
});

// ===== CEP AUTOMÁTICO =====
const cepInput = document.getElementById('cep');

cepInput.addEventListener('input', () => {
  let valor = cepInput.value.replace(/\D/g, '');
  valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
  cepInput.value = valor;
});

cepInput.addEventListener('blur', () => {
  const cep = cepInput.value.replace(/\D/g, '');

  if (cep.length !== 8) return;

  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(dados => {
      if (dados.erro) {
        alert('CEP não encontrado');
        return;
      }

      document.getElementById('rua').value = dados.logradouro;
      document.getElementById('cidade').value = dados.localidade;
      document.getElementById('estado').value = dados.uf;
    });
});
